services:
  redis:
    image: redis:7-alpine
    container_name: mist-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - mist-network

  api:
    build:
      context: .
      dockerfile: api-service/Dockerfile
    container_name: mist-api
    ports:
      - "8000:8000"
    env_file:
      - ./.env
    environment:
      - PORT=8000
      - REDIS_URL=redis://redis:6379/0
    dns:
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - mist-network

  upload:
    build:
      context: .
      dockerfile: upload-service/Dockerfile
    container_name: mist-upload
    ports:
      - "8001:8000"
    env_file:
      - ./.env
    environment:
      - PORT=8000
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - mist-network

  processor:
    build:
      context: .
      dockerfile: processor/Dockerfile
    container_name: mist-processor
    env_file:
      - ./.env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - API_BASE_URL=${API_BASE_URL:-http://localhost:8000}
      - HLS_KEY_BASE_URL=${HLS_KEY_BASE_URL:-http://localhost:8000}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - mist-network

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}
        NEXT_PUBLIC_UPLOAD_API_BASE_URL: ${NEXT_PUBLIC_UPLOAD_API_BASE_URL:-http://localhost:8001/api/v1}
    container_name: mist-web
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - mist-network

volumes:
  redis-data:

networks:
  mist-network:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.enable_ip_masquerade: "true"
    ipam:
      config:
        - subnet: 172.20.0.0/16
